<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pinkjujapipi - Web Design & Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f0f4ff; font-family: 'Mitr', sans-serif; }
        .paper-style { background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-4xl mx-auto space-y-8">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row gap-6 items-center">
            <div class="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-indigo-100">
                <h1 class="text-3xl font-bold text-indigo-900 font-fredoka">pinkjujapipi</h1>
                <p class="text-indigo-600 mt-2">ร้านจูรับทำเว็บครบวงจรนะแม่น้า ⭐️</p>
            </div>
            <!-- โปรไฟล์หลัก -->
            <div class="w-48 h-48 rounded-2xl overflow-hidden shadow-lg border-4 border-white transform rotate-3">
                <img src="jele.jpg" alt="Profile" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- Main Content -->
        <div class="paper-style rounded-3xl p-8 border border-indigo-50">
            <!-- แบนเนอร์ -->
            <img src="jele2.jpg" alt="Banner" class="w-full h-64 object-cover rounded-2xl mb-8 shadow-sm">
            
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-indigo-900">บริการของเรา</h2>
                <!-- รูปตกแต่ง 1 -->
                <img src="jele3.jpg" alt="Decor" class="w-16 h-16 rounded-full object-cover shadow-md">
            </div>

            <ul class="space-y-4 text-indigo-800 text-lg mb-8">
                <li>✅ เว็บแอพพรีเมียม</li>
                <li>✅ เว็บรับเติมเกมส์</li>
                <li>✅ เว็บรับทำป้าย</li>
            </ul>

            <div class="border-t pt-8 flex items-center justify-between">
                <p class="text-indigo-400 italic">ขอบคุณที่ใช้บริการ pinkjujapipi ค่ะ</p>
                <!-- รูปตกแต่ง 2 -->
                <img src="jele4.jpg" alt="Decor" class="w-20 h-20 rounded-2xl object-cover shadow-md transform -rotate-6">
            </div>
        </div>

        <!-- Footer Contact -->
        <div class="text-center space-y-4">
            <a href="https://www.facebook.com/profile.php?id=61554192600355" class="inline-block bg-indigo-600 text-white px-8 py-3 rounded-full font-bold hover:bg-indigo-700 transition">Facebook</a>
            <a href="https://line.me/ti/p/LfBtdhlrVa" class="inline-block bg-green-500 text-white px-8 py-3 rounded-full font-bold hover:bg-green-600 transition ml-4">Line</a>
        </div>
    </div>
</body>
</html>
